<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RedTrex Technologies – We've Moved!</title>
  <meta name="description" content="RedTrex Technologies has moved to a new website. Visit us at www.redtrex.com.lk">
  <link rel="icon" type="image/png" href="Assest/company.png" />
  <meta http-equiv="refresh" content="5;url=https://www.redtrex.com.lk" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
      opacity: 0.35;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      width: 100%;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      padding: 52px 44px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.6s cubic-bezier(.2,.9,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      margin-bottom: 32px;
    }

    .logo img {
      height: 64px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .moved-badge {
      display: inline-block;
      background: rgba(21, 101, 192, 0.3);
      border: 1px solid rgba(21, 101, 192, 0.6);
      color: #90caf9;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 22px;
    }

    h1 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .new-url-btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 24px rgba(13, 71, 161, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      margin-bottom: 28px;
    }

    .new-url-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(13, 71, 161, 0.6);
    }

    .new-url-btn:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .redirect-notice {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.85rem;
    }

    .countdown {
      color: #90caf9;
      font-weight: 700;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 28px 0;
    }

    .footer-note {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <video autoplay muted loop id="bg-video" playsinline>
    <source src="assetphy/white-lines-on-blue-background.1920x1080.mp4" type="video/mp4">
  </video>

  <div class="container">
    <div class="card">

      <div class="logo">
        <img src="Assest/company.png" alt="RedTrex Technologies Logo" />
      </div>

      <div class="moved-badge">We've Moved</div>

      <h1>Our website has a new home</h1>

      <p class="subtitle">
        RedTrex Technologies has moved to a brand new website.<br>
        Click below to visit us at our new address.
      </p>

      <a href="https://www.redtrex.com.lk" class="new-url-btn">
        Visit www.redtrex.com.lk
      </a>

      <p class="redirect-notice">
        You will be redirected automatically in <span class="countdown" id="countdown">5</span> seconds.
      </p>

      <hr class="divider" />

      <p class="footer-note">RedTrex Technologies &mdash; Genuine Software Keys &amp; IT Services, Sri Lanka</p>

    </div>
  </div>

  <script>
    let seconds = 5;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://www.redtrex.com.lk';
      }
    }, 1000);
  </script>

</body>
</html>
